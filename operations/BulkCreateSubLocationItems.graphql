# BulkCreateSubLocationItems.graphql
# Creates multiple sublocation item associations (e.g. vendor items in a sublocation)
# Purpose: Fill sublocations with vendor items

mutation BulkCreateSubLocationItems($input: BulkCreateSubLocationItemsInput!) {
  bulkCreateSubLocationItems(input: $input) {
    subLocationItems {
      id
      subLocation {
        id
      }
      vendorItem {
        id
      }
    }
    error {
      message
    }
  }
}

